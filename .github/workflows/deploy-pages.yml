name: Deploy PaperShoot to GitHub Pages

on:
  push:
    branches:
      - main
      - feat/papershoot-mvp
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-branch
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish dist to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORKTREE_DIR="$(mktemp -d)"

          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add "$WORKTREE_DIR" origin/gh-pages
          else
            git worktree add -b gh-pages "$WORKTREE_DIR"
          fi

          find "$WORKTREE_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R dist/. "$WORKTREE_DIR"/
          touch "$WORKTREE_DIR/.nojekyll"

          cd "$WORKTREE_DIR"
          git add --all

          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish."
            exit 0
          fi

          git commit -m "deploy: update GitHub Pages"
          git push origin HEAD:gh-pages
